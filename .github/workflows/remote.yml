name: Linux Desktop with XFCE and Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XFCE4, VNC, and prerequisites
        run: |
          set -e
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver xfonts-base
          sudo apt install -y wget curl unzip dbus-x11

      - name: Install Firefox without Snap
        run: |
          set -e
          sudo add-apt-repository ppa:mozillateam/ppa -y
          sudo apt update
          sudo apt install -y firefox-esr

      - name: Setup and start VNC server properly
        run: |
          set -e
          mkdir -p ~/.vnc
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Kill VNC cũ nếu có
          tightvncserver -kill :1 2>/dev/null || true
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1
          
          # Tạo script khởi động XFCE cho VNC
          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/bash
          xrdb $HOME/.Xresources
          startxfce4 &
          EOF
          chmod +x ~/.vnc/xstartup
          
          # Khởi động VNC - bỏ -localhost no
          tightvncserver :1 -geometry 1280x800 -depth 24
          
          # Đợi VNC thực sự lắng nghe
          echo "Waiting for VNC to be ready..."
          sleep 5
          
          # Kiểm tra VNC đã chạy chưa
          if pgrep -f "Xtightvnc :1" > /dev/null; then
            echo "VNC process is running"
          else
            echo "Error: VNC process not found"
            cat ~/.vnc/*.log 2>/dev/null || true
            exit 1
          fi
          
          # Kiểm tra port
          ss -tlnp | grep 5901 || netstat -tlnp 2>/dev/null | grep 5901 || echo "Checking port with lsof..."
          lsof -i :5901 2>/dev/null || echo "Port check done"

      - name: Create Cloudflare Tunnel
        run: |
          set -e
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          # Chạy tunnel
          ./cloudflared-linux-amd64 tunnel --url http://localhost:5901 > cloudflare.log 2>&1 &
          TUNNEL_PID=$!
          
          echo "Waiting for Cloudflare Tunnel (PID: $TUNNEL_PID)..."
          sleep 15
          
          echo "=============================================="
          echo "Cloudflare Tunnel URL:"
          grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare.log || (
            echo "First attempt failed. Full log:"
            cat cloudflare.log
            echo "Retrying in 5 seconds..."
            sleep 5
            grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare.log || echo "URL extraction failed"
          )
          echo "=============================================="
          
          # Giữ tunnel PID để biết
          echo $TUNNEL_PID > /tmp/tunnel.pid

      - name: Keep session alive
        run: |
          echo "=============================================="
          echo "XFCE Desktop is running!"
          echo "Use VNC viewer to connect with password: 123456"
          echo "Session will last up to 6 hours"
          echo "=============================================="
          while true; do sleep 60; done
