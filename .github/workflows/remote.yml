name: Linux Desktop with XFCE and Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install all packages
        run: |
          set -e
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tightvncserver xfonts-base
          sudo apt install -y wget curl unzip dbus-x11
          sudo add-apt-repository ppa:mozillateam/ppa -y
          sudo apt update
          sudo apt install -y firefox-esr

      - name: Start everything and keep alive
        run: |
          set -e
          
          # === Setup VNC ===
          mkdir -p ~/.vnc
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          tightvncserver -kill :1 2>/dev/null || true
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1
          
          cat > ~/.vnc/xstartup << 'XSTARTUP'
          #!/bin/bash
          xrdb $HOME/.Xresources
          startxfce4 &
          XSTARTUP
          chmod +x ~/.vnc/xstartup
          
          tightvncserver :1 -geometry 1280x800 -depth 24
          echo "VNC started on port 5901"
          
          # === Download and start Cloudflare Tunnel ===
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          ./cloudflared-linux-amd64 tunnel --url http://localhost:5901 > cloudflare.log 2>&1 &
          TUNNEL_PID=$!
          echo "Cloudflare Tunnel started with PID: $TUNNEL_PID"
          
          # === Wait for URL ===
          echo "Waiting for tunnel URL..."
          sleep 15
          
          # === Show URL ===
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║         CLOUDFLARE TUNNEL URL FOR VNC               ║"
          echo "╠══════════════════════════════════════════════════════╣"
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "║  $TUNNEL_URL"
            echo "╠══════════════════════════════════════════════════════╣"
            echo "║  VNC Password: 123456                               ║"
            echo "║  Connect with RealVNC or any VNC client              ║"
          else
            echo "║  URL not found yet, checking log..."
            cat cloudflare.log
            TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "║  $TUNNEL_URL"
            fi
          fi
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          
          # === Keep everything alive for 6 hours ===
          echo "Session will run for up to 6 hours. Press Ctrl+C in VNC to disconnect."
          while true; do
            # Check VNC is still running
            if ! pgrep -f "Xtightvnc :1" > /dev/null; then
              echo "VNC died! Restarting..."
              tightvncserver :1 -geometry 1280x800 -depth 24
            fi
            # Check tunnel is still running
            if ! kill -0 $TUNNEL_PID 2>/dev/null; then
              echo "Tunnel died! Restarting..."
              ./cloudflared-linux-amd64 tunnel --url http://localhost:5901 > cloudflare.log 2>&1 &
              TUNNEL_PID=$!
            fi
            sleep 30
          done
