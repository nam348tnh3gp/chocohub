name: Linux Desktop with XFCE and Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install all packages
        run: |
          set -e
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies x11vnc xvfb xfonts-base
          sudo apt install -y wget curl unzip dbus-x11
          sudo add-apt-repository ppa:mozillateam/ppa -y
          sudo apt update
          sudo apt install -y firefox-esr

      - name: Start everything and keep alive
        run: |
          set -e
          
          echo "=============================================="
          echo "Step 1: Setting up virtual display with Xvfb"
          echo "=============================================="
          
          # Kill any existing X sessions
          pkill Xvfb 2>/dev/null || true
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1
          
          # Start virtual display
          Xvfb :1 -screen 0 1280x800x24 &
          XVFB_PID=$!
          echo "Xvfb started with PID: $XVFB_PID"
          sleep 2
          
          # Set DISPLAY
          export DISPLAY=:1
          echo "DISPLAY set to :1"
          
          echo ""
          echo "=============================================="
          echo "Step 2: Starting XFCE desktop"
          echo "=============================================="
          
          # Start XFCE on the virtual display
          startxfce4 &
          XFCE_PID=$!
          echo "XFCE started with PID: $XFCE_PID"
          sleep 5
          
          echo ""
          echo "=============================================="
          echo "Step 3: Starting x11vnc server"
          echo "=============================================="
          
          # Create password file
          mkdir -p ~/.vnc
          x11vnc -storepasswd 123456 ~/.vnc/passwd
          
          # Start x11vnc - listen on ALL interfaces (0.0.0.0)
          x11vnc -display :1 \
            -forever \
            -shared \
            -rfbport 5901 \
            -rfbauth ~/.vnc/passwd \
            -listen 0.0.0.0 \
            -noxdamage \
            -noxfixes \
            -nopw \
            -wait 50 \
            -maxclients 10 \
            > x11vnc.log 2>&1 &
          VNC_PID=$!
          echo "x11vnc started with PID: $VNC_PID"
          sleep 3
          
          # Verify x11vnc
          if kill -0 $VNC_PID 2>/dev/null; then
            echo "✓ x11vnc is running"
          else
            echo "✗ x11vnc failed. Log:"
            cat x11vnc.log
            exit 1
          fi
          
          # Check listening port
          echo "VNC listening on:"
          ss -tlnp 2>/dev/null | grep 5901 || netstat -tlnp 2>/dev/null | grep 5901
          
          # Test VNC port directly
          echo ""
          echo "Testing VNC port 5901..."
          timeout 3 bash -c 'echo > /dev/tcp/0.0.0.0/5901' 2>/dev/null && echo "✓ Port 5901 reachable" || echo "⚠ Port check done"
          
          echo ""
          echo "=============================================="
          echo "Step 4: Starting Cloudflare Tunnel"
          echo "=============================================="
          
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          # Point tunnel directly to VNC (no socat needed!)
          ./cloudflared-linux-amd64 tunnel --url http://localhost:5901 > cloudflare.log 2>&1 &
          TUNNEL_PID=$!
          echo "Tunnel PID: $TUNNEL_PID"
          
          echo "Waiting for Cloudflare Tunnel to establish..."
          sleep 20
          
          echo ""
          echo "=============================================="
          echo "TUNNEL LOG:"
          echo "=============================================="
          cat cloudflare.log
          echo ""
          
          # Extract URL
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare.log | head -1)
          
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║          XFCE DESKTOP READY                         ║"
          echo "╠══════════════════════════════════════════════════════╣"
          if [ -n "$TUNNEL_URL" ]; then
            echo "║  URL: $TUNNEL_URL"
          else
            echo "║  Check cloudflare.log above for trycloudflare URL   ║"
          fi
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  VNC Password: 123456                               ║"
          echo "║  Use RealVNC/TigerVNC client to connect             ║"
          echo "║  Paste URL (without https://) in VNC client         ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          
          # Keep alive
          echo "=== Session active (up to 6 hours) ==="
          while true; do
            # Check and restart Xvfb
            if ! kill -0 $XVFB_PID 2>/dev/null; then
              echo "[$(date)] Xvfb died! Restarting..."
              Xvfb :1 -screen 0 1280x800x24 &
              XVFB_PID=$!
              sleep 2
            fi
            
            # Check and restart x11vnc
            if ! kill -0 $VNC_PID 2>/dev/null; then
              echo "[$(date)] x11vnc died! Restarting..."
              x11vnc -display :1 -forever -shared -rfbport 5901 \
                -rfbauth ~/.vnc/passwd -listen 0.0.0.0 \
                -noxdamage -noxfixes -wait 50 \
                > x11vnc.log 2>&1 &
              VNC_PID=$!
            fi
            
            # Check and restart tunnel
            if ! kill -0 $TUNNEL_PID 2>/dev/null; then
              echo "[$(date)] Tunnel died! Restarting..."
              ./cloudflared-linux-amd64 tunnel --url http://localhost:5901 > cloudflare.log 2>&1 &
              TUNNEL_PID=$!
              sleep 15
              NEW_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflare.log | head -1)
              if [ -n "$NEW_URL" ]; then
                echo "[$(date)] New URL: $NEW_URL"
              fi
            fi
            
            sleep 30
          done
