name: Build Backup EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies in Backup folder
        working-directory: ./Backup
        run: |
          npm install
          npm rebuild better-sqlite3

      - name: Install pkg globally
        run: npm install -g pkg

      - name: Build Windows executable
        working-directory: ./Backup
        run: pkg backup.js --targets node18-win-x64 --options expose-gc --output chocohub-backup.exe

      - name: Prepare release package
        run: |
          # Tạo thư mục release
          New-Item -ItemType Directory -Force -Path release-package
          
          # Copy file exe từ Backup folder
          Copy-Item -Path "Backup/chocohub-backup.exe" -Destination "release-package/" -Force
          
          # Copy .env (kiểm tra kỹ hơn)
          $envPath = "Backup/.env"
          if (Test-Path $envPath) {
            # Hiển thị thông tin file để debug
            Get-ChildItem $envPath | Format-List
            Copy-Item -Path $envPath -Destination "release-package/.env" -Force -Verbose
            Write-Host "✅ Copied .env file"
          } else {
            Write-Host "⚠️ Backup/.env not found"
            # Liệt kê các file trong thư mục Backup để debug
            Get-ChildItem Backup/
          }
          
          # Copy .env.example
          $envExamplePath = "Backup/.env.example"
          if (Test-Path $envExamplePath) {
            Copy-Item -Path $envExamplePath -Destination "release-package/.env.example" -Force -Verbose
            Write-Host "✅ Copied .env.example file"
          } else {
            Write-Host "⚠️ Backup/.env.example not found"
          }
          


          # Liệt kê nội dung thư mục release để kiểm tra
          Write-Host "Contents of release-package:"
          Get-ChildItem release-package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocohub-backup-windows
          path: release-package/
          retention-days: 7
