name: Build Backup EXE

on:
  workflow_dispatch:  # Chỉ chạy khi kích hoạt thủ công

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: 'Backup/package.json'

      - name: Install dependencies in Backup folder
        working-directory: ./Backup
        run: npm ci

      - name: Install pkg globally
        run: npm install -g pkg

      - name: Build Windows executable
        working-directory: ./Backup
        run: pkg backup.js --targets node21-win-x64 --options expose-gc --output chocohub-backup.exe

      - name: Prepare release package
        run: |
          # Tạo thư mục tạm để đóng gói
          mkdir -p release-package
          # Copy file exe từ thư mục Backup
          cp Backup/chocohub-backup.exe release-package/
          # Copy file .env (nếu có)
          if [ -f "Backup/.env" ]; then
            cp Backup/.env release-package/
            echo "✅ Copied .env file"
          else
            echo "⚠️ Warning: Backup/.env not found, skipping"
          fi
          # Copy .env.example nếu có (tùy chọn)
          if [ -f "Backup/.env.example" ]; then
            cp Backup/.env.example release-package/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocohub-backup-windows
          path: release-package/  # Upload cả thư mục
          retention-days: 7
