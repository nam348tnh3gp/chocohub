name: Build Backup EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # CHUYỂN SANG WINDOWS để build native addon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies in Backup folder
        working-directory: ./Backup
        run: |
          npm install
          # Rebuild native addon cho Windows
          npm rebuild better-sqlite3

      - name: Install pkg globally
        run: npm install -g pkg

      - name: Build Windows executable
        working-directory: ./Backup
        run: pkg backup.js --targets node18-win-x64 --options expose-gc --output chocohub-backup.exe

      - name: Prepare release package
        run: |
          # Tạo thư mục release
          New-Item -ItemType Directory -Force -Path release-package
          
          # Copy file exe từ Backup folder
          Copy-Item Backup/chocohub-backup.exe release-package/
          
          # Copy .env nếu có
          if (Test-Path "Backup/.env") {
            Copy-Item Backup/.env release-package/
            Write-Host "✅ Copied .env file"
          } else {
            Write-Host "⚠️ Backup/.env not found, skipping"
          }
          
          # Copy .env.example nếu có
          if (Test-Path "Backup/.env.example") {
            Copy-Item Backup/.env.example release-package/
            Write-Host "✅ Copied .env.example file"
          }
          
  

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocohub-backup-windows
          path: release-package/
          retention-days: 7
