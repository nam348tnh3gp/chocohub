<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CHOCO HUB · Swap Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0807;
            background-image: radial-gradient(circle at 50% 40%, rgba(255, 120, 0, 0.08) 0%, transparent 70%);
            font-family: 'Outfit', sans-serif;
            color: #eee4d8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .swap-container {
            max-width: 550px;
            width: 100%;
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 149, 0, 0.18);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #f58a00;
            text-decoration: none;
            margin-bottom: 1.5rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-link:hover {
            gap: 12px;
            color: #ffb347;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #f58a00, #ffbf00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #8b8296;
            margin-bottom: 1.8rem;
            font-size: 0.85rem;
        }

        .balance-card {
            background: rgba(245, 138, 0, 0.08);
            border: 1px solid rgba(255, 149, 0, 0.2);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Space Mono', monospace;
        }
        .balance-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b8296;
        }
        .balance-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f58a00;
        }

        .swap-box {
            background: rgba(10, 10, 20, 0.5);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 149, 0, 0.1);
        }

        .swap-arrows {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 1.5rem;
        }
        .coin-select {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 149, 0, 0.3);
            border-radius: 60px;
            padding: 12px 20px;
            color: #f58a00;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        .coin-select option {
            background: #1a1a2a;
            color: #eee4d8;
        }
        .swap-icon {
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 149, 0, 0.1);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .swap-icon:hover {
            background: rgba(255, 149, 0, 0.3);
            transform: rotate(180deg);
        }

        .rate-badge {
            text-align: center;
            background: rgba(245, 138, 0, 0.1);
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #f58a00;
            margin-bottom: 1.2rem;
            font-family: 'Space Mono', monospace;
        }

        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b8296;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 149, 0, 0.2);
            border-radius: 16px;
            color: #f58a00;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: rgba(255, 149, 0, 0.6);
        }

        .estimated {
            font-size: 0.85rem;
            text-align: right;
            color: #aaa;
            margin-top: 8px;
            font-family: 'Space Mono', monospace;
        }

        .swap-btn {
            width: 100%;
            background: linear-gradient(135deg, #f58a00, #ff7e00);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1rem;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .swap-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .swap-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            border: 1px solid #f58a00;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: 600;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast-msg.show {
            opacity: 1;
        }

        hr {
            border-color: rgba(255, 149, 0, 0.1);
            margin: 1rem 0;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #6a6280;
        }
    </style>
</head>
<body>

<div class="swap-container">
    <a href="index.html" class="back-link">← Back to Dashboard</a>
    <h1>🔄 Swap Center</h1>
    <div class="sub">Convert between CC, DUCO and CC PoC</div>

    <div class="balance-card">
        <span class="balance-label">Your CC Balance</span>
        <span class="balance-value" id="wallet-balance">—</span>
    </div>

    <div class="swap-box">
        <div class="swap-arrows">
            <select id="from-coin" class="coin-select">
                <option value="cc">🍫 CC (Choco Coin)</option>
                <option value="duco">⚡ DUCO</option>
                <option value="ccpoc">🍬 CC PoC</option>
            </select>
            <div class="swap-icon" id="swap-icon">⇆</div>
            <select id="to-coin" class="coin-select">
                <option value="duco">⚡ DUCO</option>
                <option value="ccpoc">🍬 CC PoC</option>
                <option value="cc">🍫 CC (Choco Coin)</option>
            </select>
        </div>

        <div class="rate-badge" id="rate-display">⚡ 10 CC = 1 DUCO</div>

        <div class="input-group">
            <label>Amount to send</label>
            <input type="number" id="send-amount" placeholder="0.00" step="any">
        </div>
        <div class="estimated" id="receive-estimate">≈ 0.00</div>

        <div class="input-group">
            <label id="receiver-label">DUCO Username (receiver)</label>
            <input type="text" id="receiver-addr" placeholder="Enter receiver address or username">
        </div>

        <button class="swap-btn" id="swap-btn">Swap Now</button>
    </div>

    <hr>
    <div class="footer-note">
        ⚡ Swaps are processed instantly. CC is deducted immediately.<br>
        External coins will be sent by the system gateway.
    </div>
</div>

<div id="toast" class="toast-msg"></div>

<script>
    // Rate definitions
    const RATES = {
        'cc_to_duco': 10,      // 10 CC = 1 DUCO
        'cc_to_ccpoc': 0.75,   // 0.75 CC = 1 CC PoC
        'duco_to_cc': 0.1,     // 1 DUCO = 10 CC (ngược lại)
        'ccpoc_to_cc': 1.33333 // 1 CC PoC = 0.75 CC (ngược lại 1/0.75)
    };

    let currentUser = null;
    let currentBalance = 0;

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.borderColor = isError ? '#fa5252' : '#40c057';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }

    async function fetchBalance() {
        const token = localStorage.getItem('choco_token');
        const user = localStorage.getItem('choco_user');
        if (!user || !token) return;
        try {
            const res = await fetch('/get_user/' + encodeURIComponent(user), {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (data && typeof data.balance === 'number') {
                currentBalance = data.balance;
                document.getElementById('wallet-balance').innerHTML = `${currentBalance.toFixed(4)} CC`;
            }
        } catch(e) {
            console.warn(e);
        }
    }

    function getRateDisplay(from, to) {
        if (from === 'cc' && to === 'duco') return '⚡ 10 CC = 1 DUCO';
        if (from === 'cc' && to === 'ccpoc') return '⚡ 0.75 CC = 1 CC PoC';
        if (from === 'duco' && to === 'cc') return '⚡ 1 DUCO = 10 CC';
        if (from === 'ccpoc' && to === 'cc') return '⚡ 1 CC PoC = 0.75 CC';
        if (from === 'duco' && to === 'ccpoc') return '⚠️ Direct swap not supported → need CC intermediate';
        if (from === 'ccpoc' && to === 'duco') return '⚠️ Direct swap not supported → need CC intermediate';
        return '⚡ Rate unavailable';
    }

    function getRate(from, to) {
        const key = `${from}_to_${to}`;
        return RATES[key] || null;
    }

    function updateEstimate() {
        const fromCoin = document.getElementById('from-coin').value;
        const toCoin = document.getElementById('to-coin').value;
        const sendAmount = parseFloat(document.getElementById('send-amount').value) || 0;

        let receiveAmount = 0;
        let rate = getRate(fromCoin, toCoin);

        if (rate !== null) {
            if (fromCoin === 'cc') {
                receiveAmount = sendAmount / rate;
            } else {
                receiveAmount = sendAmount * rate;
            }
        } else {
            receiveAmount = 0;
        }

        let receiveUnit = '';
        if (toCoin === 'cc') receiveUnit = 'CC';
        else if (toCoin === 'duco') receiveUnit = 'DUCO';
        else receiveUnit = 'CC PoC';

        document.getElementById('receive-estimate').innerHTML = `≈ ${receiveAmount.toFixed(6)} ${receiveUnit}`;
        document.getElementById('rate-display').innerHTML = getRateDisplay(fromCoin, toCoin);
        
        // Update receiver label
        const receiverLabel = document.getElementById('receiver-label');
        if (toCoin === 'duco') receiverLabel.innerHTML = 'DUCO Username (receiver)';
        else if (toCoin === 'ccpoc') receiverLabel.innerHTML = 'CC PoC Wallet Address';
        else receiverLabel.innerHTML = 'Receiver CC Username';
    }

    async function performSwap() {
        const token = localStorage.getItem('choco_token');
        const user = localStorage.getItem('choco_user');
        if (!user || !token) {
            showToast('Please log in first', true);
            setTimeout(() => window.location.href = 'index.html', 1500);
            return;
        }

        const fromCoin = document.getElementById('from-coin').value;
        const toCoin = document.getElementById('to-coin').value;
        const sendAmount = parseFloat(document.getElementById('send-amount').value);
        const receiver = document.getElementById('receiver-addr').value.trim();

        if (!sendAmount || sendAmount <= 0) {
            showToast('Please enter a valid amount', true);
            return;
        }
        if (!receiver) {
            showToast('Please enter receiver info', true);
            return;
        }

        // Case 1: CC → external (DUCO / CC PoC)
        if (fromCoin === 'cc' && (toCoin === 'duco' || toCoin === 'ccpoc')) {
            if (sendAmount > currentBalance) {
                showToast(`Insufficient balance. You have ${currentBalance.toFixed(4)} CC`, true);
                return;
            }
            const swapType = toCoin === 'duco' ? 'duco' : 'ccpoc';
            const payload = {
                from_user: user,
                amount_cc: sendAmount,
                swap_type: swapType,
                receiver: receiver
            };
            try {
                const res = await fetch('/swap/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast(`Swap request created! -${sendAmount} CC`, false);
                    await fetchBalance();
                    document.getElementById('send-amount').value = '';
                    document.getElementById('receiver-addr').value = '';
                    updateEstimate();
                } else {
                    showToast(data.message || 'Swap failed', true);
                }
            } catch (err) {
                showToast('Server error', true);
            }
        }
        // Case 2: External (DUCO / CC PoC) → CC (receive CC, need to send external coin)
        else if ((fromCoin === 'duco' || fromCoin === 'ccpoc') && toCoin === 'cc') {
            showToast('⚠️ This swap type requires you to send external coins first. The system will provide instructions.', true);
            // Optional: implement reverse swap logic here
        }
        else {
            showToast('Direct swap not supported. Only CC → DUCO/CC PoC is available.', true);
        }
    }

    // Event listeners
    document.getElementById('from-coin').addEventListener('change', () => {
        const fromVal = document.getElementById('from-coin').value;
        const toSelect = document.getElementById('to-coin');
        if (fromVal === 'cc') {
            toSelect.innerHTML = '<option value="duco">⚡ DUCO</option><option value="ccpoc">🍬 CC PoC</option>';
        } else if (fromVal === 'duco') {
            toSelect.innerHTML = '<option value="cc">🍫 CC (Choco Coin)</option>';
        } else if (fromVal === 'ccpoc') {
            toSelect.innerHTML = '<option value="cc">🍫 CC (Choco Coin)</option>';
        }
        updateEstimate();
    });
    document.getElementById('to-coin').addEventListener('change', updateEstimate);
    document.getElementById('send-amount').addEventListener('input', updateEstimate);
    document.getElementById('swap-icon').addEventListener('click', () => {
        const fromVal = document.getElementById('from-coin').value;
        const toVal = document.getElementById('to-coin').value;
        document.getElementById('from-coin').value = toVal;
        document.getElementById('to-coin').value = fromVal;
        document.getElementById('from-coin').dispatchEvent(new Event('change'));
        updateEstimate();
    });
    document.getElementById('swap-btn').addEventListener('click', performSwap);

    // Initial load
    (async () => {
        await fetchBalance();
        if (!localStorage.getItem('choco_user')) {
            showToast('Redirecting to login...', true);
            setTimeout(() => window.location.href = 'index.html', 1500);
        }
        setInterval(fetchBalance, 5000);
        updateEstimate();
    })();
</script>
</body>
</html>
