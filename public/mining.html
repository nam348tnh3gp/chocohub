<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choco Hub · Web Miner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c; --card: #14151a; --border: rgba(255,184,108,0.15);
            --gold: #ffb86c; --text: #e0e0e0; --mid: #8b949e; --dim: #484f58;
            --green: #50fa7b; --red: #ff5555;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px 16px;
        }
        .btn-back {
            position: fixed; top: 20px; left: 20px;
            font-family: 'Space Mono', monospace; font-size: 0.7rem;
            padding: 8px 12px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); border-radius: 8px;
            text-decoration: none; color: var(--mid); transition: .3s; z-index: 1000;
        }
        .btn-back:hover { color: var(--gold); border-color: var(--gold); background: rgba(255,184,108,0.05); }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 1.8rem; color: var(--gold); }
        .header p  { color: var(--mid); font-size: 0.85rem; margin-top: 4px; }
        .container { width: 100%; max-width: 480px; }
        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-val  { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--gold); }
        .stat-lbl  { font-size: 0.55rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .section-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
            color: var(--dim); margin-bottom: 10px;
        }
        .block-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .block-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
            display: flex; align-items: center; justify-content: space-between;
            transition: .3s;
        }
        .block-card.mining { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,184,108,0.1); }
        .block-info { flex: 1; }
        .block-id   { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--gold); margin-bottom: 6px; }
        .badge {
            font-size: 0.65rem; font-weight: 600; padding: 3px 8px; border-radius: 6px;
            font-family: 'Space Mono', monospace; margin-right: 4px;
        }
        .badge-diff   { background: rgba(255,184,108,0.1); color: var(--gold); }
        .badge-reward { background: rgba(100,200,255,0.1); color: #6be5ff; }
        .badge-mining { background: rgba(255,184,108,0.25); color: #fff; }
        .progress-bar-bg { height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
        .progress-bar    { height: 100%; background: var(--gold); width: 0%; transition: width .5s; }
        .control-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .btn-start, .btn-stop {
            width: 100%; padding: 14px; border-radius: 10px;
            font-weight: 800; font-size: 0.9rem; cursor: pointer;
            transition: .3s; margin-bottom: 10px; border: none;
        }
        .btn-start { background: linear-gradient(135deg, #f58a00 0%, #ffae42 100%); color: #000; box-shadow: 0 4px 15px rgba(245,138,0,0.3); }
        .btn-start:hover { transform: translateY(-2px); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-stop { background: rgba(255,85,85,0.1); color: #ff5555; border: 1px solid #ff5555; }
        .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }
        .console {
            margin-top: 16px; background: #050505; border-radius: 8px;
            padding: 12px; height: 150px; overflow-y: auto;
            font-family: 'Space Mono', monospace; font-size: 0.7rem;
            color: #50fa7b; border: 1px solid rgba(80,250,123,0.1);
        }
        .log-win  { color: var(--green); }
        .log-err  { color: var(--red); }
        .log-warn { color: #f1fa8c; }
        .log-info { color: #6be5ff; }
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 10px 20px; border-radius: 10px;
            font-size: 0.85rem; opacity: 0; transition: .4s; pointer-events: none; z-index: 999;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.win  { border-color: var(--green); color: var(--green); }
        #toast.err  { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<a href="/" class="btn-back">← BACK</a>

<div class="container">
    <div class="header">
        <h1>💻 Web Miner</h1>
        <p>SHA-256 · 1-Click Auto Mine</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="stat-hashrate">0 H/s</div><div class="stat-lbl">Speed</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-hashes">0</div><div class="stat-lbl">Total Hashes</div></div>
    </div>

    <div class="section-title">Current Block</div>
    <div id="block-info" style="margin-bottom: 20px;">
        <div class="block-card">
            <div class="block-info">
                <div class="block-id" id="current-block-id">No block selected</div>
                <span class="badge badge-diff" id="current-block-diff">-</span>
                <span class="badge badge-reward" id="current-block-reward">-</span>
            </div>
        </div>
    </div>

    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="control-panel">
        <button id="btn-start" class="btn-start" onclick="toggleMining()">▶ START MINING</button>
        <button id="btn-stop" class="btn-stop" disabled onclick="stopMining()">■ STOP MINING</button>
        <div id="console" class="console"></div>
    </div>
</div>

<div id="toast"></div>

<script>
const API = window.location.origin;
let miningActive = false;
let autoMineEnabled = false;  // ← KHÓA AUTO: khi true thì luôn tự đào
let currentBountyId = null;
let currentJob = null;
let totalHashes = 0;
let startTime = null;
let currentNonce = 0;
let hashrateInterval = null;
let allBounties = {};

function getWorkerName() { return (localStorage.getItem('choco_user') || 'anonymous').toLowerCase(); }
function fmtHashrate(hps) { if (hps >= 1e6) return (hps/1e6).toFixed(2)+' MH/s'; if (hps>=1e3) return (hps/1e3).toFixed(2)+' kH/s'; return hps.toFixed(1)+' H/s'; }
function fmtNum(n) { if (n>=1e9) return (n/1e9).toFixed(1)+'B'; if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'k'; return n.toString(); }

function log(msg, cls='') {
    const con = document.getElementById('console');
    const line = document.createElement('div');
    line.className = 'log-line ' + cls;
    line.textContent = '> ' + msg;
    con.appendChild(line);
    con.scrollTop = con.scrollHeight;
    while (con.children.length > 100) con.removeChild(con.firstChild);
}

function toast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3500);
}

// ── SHA-256 ────────────────────────────────────────
async function sha256(str) {
    const encoder = new TextEncoder();
    const data = encoder.encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function meetsTarget(hashHex, targetBinStr) {
    const bitsRequired = targetBinStr.length;
    const hexLen = Math.ceil(bitsRequired / 4);
    const prefixHex = hashHex.substring(0, hexLen);
    let binFull = '';
    for (const ch of prefixHex) {
        binFull += parseInt(ch, 16).toString(2).padStart(4, '0');
    }
    return binFull.startsWith(targetBinStr);
}

// ── Fetch blocks ───────────────────────────────────
async function fetchBlocks() {
    try {
        const res = await fetch(`${API}/active_bounties_list`);
        const data = await res.json();
        allBounties = data;
        updateBlockDisplay();
    } catch (e) {
        log('Cannot connect to server', 'log-err');
    }
}

function updateBlockDisplay() {
    const ids = Object.keys(allBounties);
    if (ids.length === 0) {
        document.getElementById('current-block-id').textContent = 'No blocks available';
        document.getElementById('current-block-diff').textContent = '-';
        document.getElementById('current-block-reward').textContent = '-';
        return;
    }
    
    if (miningActive && currentBountyId && allBounties[currentBountyId]) {
        displayBlockInfo(currentBountyId);
        return;
    }
    
    if (!miningActive) {
        currentBountyId = ids[0];
        displayBlockInfo(currentBountyId);
    }
}

function displayBlockInfo(bountyId) {
    const b = allBounties[bountyId];
    if (!b) return;
    document.getElementById('current-block-id').textContent = '#' + bountyId.substring(0, 12) + '...';
    document.getElementById('current-block-diff').textContent = (b.difficulty_bits || '?') + ' bits';
    document.getElementById('current-block-reward').textContent = (b.reward || 0) + ' CC';
}

// ── Toggle Mining (1 nút) ──────────────────────────
async function toggleMining() {
    if (miningActive) {
        // Đang chạy → STOP
        autoMineEnabled = false;
        stopMining();
        log('⏹️ Mining stopped.', 'log-info');
    } else {
        // Đang dừng → START
        autoMineEnabled = true;
        log('🚀 Auto-mining enabled. Press STOP to pause.', 'log-info');
        await startMiningLoop();
    }
}

async function startMiningLoop() {
    if (!autoMineEnabled) return;
    if (!currentBountyId || !allBounties[currentBountyId]) {
        await fetchBlocks();
        if (!currentBountyId) {
            log('⏳ No blocks available. Retrying...', 'log-warn');
            setTimeout(startMiningLoop, 5000);
            return;
        }
    }
    
    stopMiningInternal();
    
    try {
        const res = await fetch(`${API}/get_job/${currentBountyId}`);
        if (!res.ok) {
            log('Block expired, switching...', 'log-warn');
            await fetchBlocks();
            setTimeout(startMiningLoop, 1000);
            return;
        }
        currentJob = await res.json();
    } catch (e) {
        log('Error: ' + e.message, 'log-err');
        setTimeout(startMiningLoop, 5000);
        return;
    }
    
    miningActive = true;
    totalHashes = 0;
    currentNonce = Math.floor(Math.random() * 1000000);
    startTime = Date.now();
    
    document.getElementById('btn-start').textContent = '⏸ PAUSE MINING';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = false;
    
    const workerName = getWorkerName();
    const targetBin = currentJob.target_bin;
    const lastHash = currentJob.last_hash;
    const bountyId = currentBountyId;
    const diffBits = currentJob.difficulty_bits;
    const reward = allBounties[bountyId]?.reward || '?';
    
    log(`⛏️ Mining #${bountyId.substring(0,10)}... (${diffBits} bits, ${reward} CC)`, 'log-info');
    
    hashrateInterval = setInterval(() => {
        if (!miningActive) return;
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed > 0) {
            document.getElementById('stat-hashrate').textContent = fmtHashrate(totalHashes / elapsed);
        }
        document.getElementById('progress-bar').style.width = Math.min(90, 10 + (totalHashes / 300000) * 70) + '%';
    }, 1000);
    
    const BATCH = 2000;
    
    async function mine() {
        if (!miningActive) return;
        
        let batchHashes = 0;
        for (let i = 0; i < BATCH; i++) {
            if (!miningActive) return;
            
            const input = lastHash + currentNonce + workerName;
            const hashed = await sha256(input);
            
            if (meetsTarget(hashed, targetBin)) {
                log(`🎯 Nonce found: ${currentNonce}`, 'log-win');
                document.getElementById('progress-bar').style.width = '100%';
                miningActive = false;
                await submitSolution(bountyId, currentNonce, workerName);
                // Tự động đào block tiếp theo
                if (autoMineEnabled) {
                    await fetchBlocks();
                    setTimeout(startMiningLoop, 2000);
                }
                return;
            }
            
            currentNonce++;
            batchHashes++;
        }
        
        totalHashes += batchHashes;
        document.getElementById('stat-hashes').textContent = fmtNum(totalHashes);
        
        if (miningActive) await new Promise(r => setTimeout(r, 0));
        if (miningActive) mine();
    }
    
    mine();
}

function stopMiningInternal() {
    miningActive = false;
    if (hashrateInterval) { clearInterval(hashrateInterval); hashrateInterval = null; }
}

function stopMining() {
    autoMineEnabled = false;
    stopMiningInternal();
    document.getElementById('btn-start').textContent = '▶ START MINING';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('stat-hashrate').textContent = '0 H/s';
    log('⏹️ Miner stopped.', 'log-info');
}

async function submitSolution(id, nonce, workerName) {
    log(`📡 Submitting nonce ${nonce}...`, 'log-info');
    try {
        const res = await fetch(`${API}/submit_solution`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bounty_id: id, nonce: nonce, worker_name: workerName, device_type: 'web_miner' })
        });
        const result = await res.json();
        
        if (res.ok && result.status === 'success') {
            log('🏆 BLOCK SOLVED! +' + (result.reward || '?') + ' CC', 'log-win');
            toast('🏆 +' + (result.reward || '?') + ' CC!', 'win');
        } else {
            log('❌ ' + (result.reason || 'Rejected'), 'log-err');
            toast('❌ Rejected', 'err');
        }
    } catch (e) {
        log('Connection error: ' + e.message, 'log-err');
    }
}

// ── Init ───────────────────────────────────────────
window.onload = async () => {
    await fetchBlocks();
    
    // Tự động start sau 1 giây
    setTimeout(async () => {
        if (!miningActive && currentBountyId) {
            autoMineEnabled = true;
            log('🚀 Auto-starting miner...', 'log-info');
            await startMiningLoop();
        }
    }, 1000);
    
    setInterval(fetchBlocks, 30000);
    
    // Kiểm tra block bị solve bởi người khác
    setInterval(async () => {
        if (miningActive && currentBountyId && !allBounties[currentBountyId]) {
            log('⚠️ Block solved by another miner. Switching...', 'log-warn');
            stopMiningInternal();
            await fetchBlocks();
            if (autoMineEnabled && currentBountyId) {
                setTimeout(startMiningLoop, 1000);
            }
        }
    }, 5000);
};
</script>
</body>
</html>
