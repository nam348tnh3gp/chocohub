<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ChocoHub · Web Miner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D0B0A;
            background-image: radial-gradient(circle at 20% 30%, rgba(245, 138, 0, 0.08) 0%, transparent 70%);
            font-family: 'Inter', sans-serif;
            color: #F5EDE0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Layout */
        .miner-container {
            max-width: 680px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F58A00, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-link {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(245, 138, 0, 0.25);
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #B0A89A;
            font-weight: 500;
            transition: 0.2s;
        }
        .back-link:hover {
            border-color: #F58A00;
            color: #F58A00;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: rgba(18, 16, 15, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245, 138, 0, 0.2);
            border-radius: 24px;
            padding: 1rem;
            text-align: center;
            transition: 0.2s;
        }
        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #F58A00;
            margin-bottom: 6px;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8B8296;
        }

        /* Current job card */
        .job-card {
            background: rgba(18, 16, 15, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(245, 138, 0, 0.3);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }
        .job-card.mining {
            border-color: #F58A00;
            box-shadow: 0 0 18px rgba(245,138,0,0.2);
        }
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .job-id {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            background: rgba(245,138,0,0.1);
            padding: 4px 12px;
            border-radius: 40px;
            color: #F58A00;
        }
        .reward-badge {
            background: rgba(80,250,123,0.1);
            color: #7FE0A0;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .difficulty-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #B0A89A;
            margin-bottom: 1rem;
        }
        .progress-bar-bg {
            height: 6px;
            background: #2A2522;
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #F58A00, #FFB347);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        /* Control panel */
        .control-panel {
            background: rgba(18, 16, 15, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(245, 138, 0, 0.2);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #F58A00, #FFB347);
            color: #0D0B0A;
            box-shadow: 0 4px 12px rgba(245,138,0,0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .btn-secondary {
            background: rgba(255,85,85,0.1);
            border: 1px solid #FF5555;
            color: #FF8888;
        }
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255,85,85,0.2);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Console log */
        .console {
            background: #0A0A0A;
            border-radius: 20px;
            padding: 1rem;
            height: 160px;
            overflow-y: auto;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            border: 1px solid rgba(245,138,0,0.15);
        }
        .log-line {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            color: #7FE0A0;
        }
        .log-info { color: #6BE5FF; }
        .log-warn { color: #F5A623; }
        .log-err  { color: #FF8888; }
        .log-win  { color: #7FE0A0; font-weight: 600; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E1B1A;
            border: 1px solid #F58A00;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(12px);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { border-color: #40C057; color: #40C057; }
        .toast.error { border-color: #FA5252; color: #FA5252; }

        @media (max-width: 560px) {
            .stats-grid { gap: 8px; }
            .stat-value { font-size: 1.2rem; }
            .job-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="miner-container">
    <div class="header">
        <div class="logo-area">
            <span style="font-size: 28px;">⛏️</span>
            <h1>Web Miner</h1>
        </div>
        <a href="/" class="back-link">← Dashboard</a>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="hashrateValue">0 H/s</div>
            <div class="stat-label">Hashrate</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalHashesValue">0</div>
            <div class="stat-label">Total Hashes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="uptimeValue">0s</div>
            <div class="stat-label">Session Time</div>
        </div>
    </div>

    <!-- Current job -->
    <div class="job-card" id="jobCard">
        <div class="job-header">
            <span class="job-id" id="jobId">No active job</span>
            <span class="reward-badge" id="rewardBadge">— CC</span>
        </div>
        <div class="difficulty-row">
            <span>Difficulty</span>
            <span id="difficultyValue" style="color:#F58A00;">—</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="control-panel">
        <div class="button-group">
            <button class="btn btn-primary" id="startBtn">▶ Start Mining</button>
            <button class="btn btn-secondary" id="stopBtn" disabled>⏹ Stop</button>
        </div>
        <div class="console" id="console">
            <div class="log-line log-info">> Ready. Waiting for job...</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    (function() {
        // ---------- Auth ----------
        const workerName = localStorage.getItem('choco_user');
        if (!workerName) {
            alert('Please log in first.');
            window.location.href = '/';
            return;
        }

        // ---------- DOM elements ----------
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const hashrateSpan = document.getElementById('hashrateValue');
        const totalHashesSpan = document.getElementById('totalHashesValue');
        const uptimeSpan = document.getElementById('uptimeValue');
        const jobIdSpan = document.getElementById('jobId');
        const rewardSpan = document.getElementById('rewardBadge');
        const difficultySpan = document.getElementById('difficultyValue');
        const progressFill = document.getElementById('progressFill');
        const consoleDiv = document.getElementById('console');

        // ---------- State ----------
        let miningActive = false;
        let autoMineEnabled = false;
        let currentJob = null;
        let totalHashes = 0;
        let sessionStart = null;
        let hashrateInterval = null;
        let currentHashCount = 0;
        let lastTimestamp = Date.now();
        let currentHashrate = 0;

        // Web Worker (mining core)
        let worker = null;

        // ---------- Helper functions ----------
        function log(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `> ${msg}`;
            consoleDiv.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while (consoleDiv.children.length > 100) consoleDiv.removeChild(consoleDiv.firstChild);
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${isError ? 'error' : 'success'}`;
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function formatHashrate(hps) {
            if (hps >= 1e6) return (hps / 1e6).toFixed(2) + ' MH/s';
            if (hps >= 1e3) return (hps / 1e3).toFixed(2) + ' kH/s';
            return hps.toFixed(1) + ' H/s';
        }

        function formatNumber(n) {
            if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
            return n.toString();
        }

        function updateUI() {
            totalHashesSpan.textContent = formatNumber(totalHashes);
            hashrateSpan.textContent = formatHashrate(currentHashrate);
            if (sessionStart) {
                const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
                uptimeSpan.textContent = elapsed + 's';
            } else {
                uptimeSpan.textContent = '0s';
            }
        }

        // Hashrate tracker
        function startHashrateTracker() {
            if (hashrateInterval) clearInterval(hashrateInterval);
            currentHashCount = 0;
            lastTimestamp = Date.now();
            hashrateInterval = setInterval(() => {
                const now = Date.now();
                const delta = (now - lastTimestamp) / 1000;
                if (delta >= 1) {
                    currentHashrate = currentHashCount / delta;
                    currentHashCount = 0;
                    lastTimestamp = now;
                    updateUI();
                }
            }, 1000);
        }

        // ---------- Job handling ----------
        async function fetchNewJob() {
            try {
                const res = await fetch('/get_job', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ worker_name: workerName })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const job = await res.json();
                if (!job || !job.bounty_id) throw new Error('Invalid job response');
                return job;
            } catch (err) {
                log(`Failed to fetch job: ${err.message}`, 'err');
                return null;
            }
        }

        async function startMiningWithJob(job) {
            if (!job) return false;
            currentJob = job;

            // Update UI
            jobIdSpan.textContent = job.bounty_id.substring(0, 12) + '...';
            const reward = (job.reward !== undefined && job.reward !== null) ? job.reward.toFixed(4) : '?';
            rewardSpan.textContent = `${reward} CC`;
            difficultySpan.textContent = job.difficulty || '?';
            document.getElementById('jobCard').classList.add('mining');
            progressFill.style.width = '0%';

            // Send to worker
            if (!worker) {
                worker = new Worker('/static/js/cpu.js');
                worker.onmessage = handleWorkerMessage;
                worker.onerror = (e) => log(`Worker error: ${e.message}`, 'err');
            }

            worker.postMessage({
                type: 'start',
                last_hash: job.last_hash,
                username: workerName,
                target_hex: job.target_hex,
                bounty_id: job.bounty_id
            });

            miningActive = true;
            totalHashes = 0;
            sessionStart = Date.now();
            currentHashCount = 0;
            currentHashrate = 0;
            startHashrateTracker();
            updateUI();

            log(`Mining job #${job.bounty_id.substring(0,10)}... | diff: ${job.difficulty} | reward: ${reward} CC`, 'info');
            return true;
        }

        function stopMiningProcess(keepJob = false) {
            if (worker && miningActive) {
                worker.postMessage({ type: 'stop' });
            }
            miningActive = false;
            if (hashrateInterval) clearInterval(hashrateInterval);
            hashrateInterval = null;
            if (!keepJob) {
                currentJob = null;
                document.getElementById('jobCard').classList.remove('mining');
                jobIdSpan.textContent = 'No active job';
                rewardSpan.textContent = '— CC';
                difficultySpan.textContent = '—';
                progressFill.style.width = '0%';
            }
            updateUI();
        }

        // Handle worker messages
        function handleWorkerMessage(e) {
            const data = e.data;
            switch (data.type) {
                case 'ready':
                    log('Worker ready', 'info');
                    break;
                case 'progress':
                    const newHashes = data.hashes || 0;
                    totalHashes += newHashes;
                    currentHashCount += newHashes;
                    updateUI();
                    // Progress bar: approximate based on difficulty (just visual)
                    const targetTotal = currentJob?.difficulty ? parseInt(currentJob.difficulty) : 50000;
                    const percent = Math.min(95, (totalHashes / targetTotal) * 100);
                    progressFill.style.width = percent + '%';
                    break;
                case 'found':
                    log(`🎉 Nonce found: ${data.nonce}`, 'win');
                    progressFill.style.width = '100%';
                    miningActive = false;
                    if (worker) worker.postMessage({ type: 'stop' });
                    submitSolution(data.bounty_id, data.nonce, workerName);
                    break;
                case 'pong':
                    // heartbeat, ignore
                    break;
                default:
                    break;
            }
        }

        // Submit solution
        async function submitSolution(bountyId, nonce, wName) {
            log(`Submitting solution for #${bountyId.substring(0,8)}...`, 'info');
            try {
                const res = await fetch('/submit_solution', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bounty_id: bountyId,
                        nonce: nonce,
                        worker_name: wName,
                        device_type: 'web_miner'
                    })
                });
                const result = await res.json();
                if (res.ok && result.status === 'success') {
                    const reward = result.reward || '?';
                    log(`✅ BLOCK SOLVED! +${reward} CC`, 'win');
                    showToast(`+${reward} CC earned!`, false);
                    // Auto-fetch next job if auto mode is on
                    if (autoMineEnabled) {
                        setTimeout(() => startMiningLoop(), 2000);
                    } else {
                        stopMiningProcess(true);
                        startBtn.textContent = '▶ Start Mining';
                        stopBtn.disabled = true;
                    }
                } else {
                    log(`❌ Submission rejected: ${result.reason || 'unknown'}`, 'err');
                    showToast('Solution rejected', true);
                    if (autoMineEnabled) {
                        setTimeout(() => startMiningLoop(), 3000);
                    }
                }
            } catch (err) {
                log(`Submission error: ${err.message}`, 'err');
                if (autoMineEnabled) {
                    setTimeout(() => startMiningLoop(), 5000);
                }
            }
        }

        // Main mining loop
        async function startMiningLoop() {
            if (!autoMineEnabled) return;
            stopMiningProcess(true);
            const job = await fetchNewJob();
            if (!job) {
                log('No job available, retrying in 5s...', 'warn');
                setTimeout(() => startMiningLoop(), 5000);
                return;
            }
            const ok = await startMiningWithJob(job);
            if (!ok) {
                setTimeout(() => startMiningLoop(), 3000);
            } else {
                startBtn.textContent = '⏸ Pause';
                stopBtn.disabled = false;
            }
        }

        // ---------- UI actions ----------
        function onStart() {
            if (miningActive) {
                // Pause
                autoMineEnabled = false;
                stopMiningProcess(true);
                startBtn.textContent = '▶ Start Mining';
                stopBtn.disabled = true;
                log('Mining paused.', 'info');
            } else {
                // Start/resume
                autoMineEnabled = true;
                startBtn.textContent = '⏸ Pause';
                stopBtn.disabled = false;
                log('Starting mining...', 'info');
                startMiningLoop();
            }
        }

        function onStop() {
            autoMineEnabled = false;
            stopMiningProcess(false);
            startBtn.textContent = '▶ Start Mining';
            stopBtn.disabled = true;
            log('Miner stopped completely.', 'warn');
        }

        // ---------- Initialize ----------
        function init() {
            startBtn.addEventListener('click', onStart);
            stopBtn.addEventListener('click', onStop);
            log(`Logged in as: ${workerName}`, 'info');
            // Auto-start after 1 second
            setTimeout(() => {
                autoMineEnabled = true;
                startMiningLoop();
            }, 1000);
        }

        init();
    })();
</script>
</body>
</html>
