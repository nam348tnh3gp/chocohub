<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choco Hub · Web Miner</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .miner-container { max-width: 600px; margin: 40px auto; padding: 0 16px; }
    .block-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .block-info { flex: 1; }
    .block-id { font-family: 'Space Mono', monospace; color: var(--amber); font-size: 0.9rem; margin-bottom: 4px; }
    .badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; background: rgba(255,184,108,0.1); color: var(--amber); font-family: 'Space Mono', monospace; margin-right: 6px; }
    .btn-mine { background: var(--amber); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; }
    .btn-mine:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: center; flex: 1; min-width: 100px; }
    .stat-val { font-family: 'Space Mono', monospace; font-size: 1.2rem; color: var(--amber); }
    .controls { margin-top: 20px; }
    .console { background: #000; color: #50fa7b; height: 120px; overflow-y: auto; padding: 10px; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 0.8rem; margin-top: 15px; }
  </style>
</head>
<body>
  <a href="/" class="btn-back">← BACK</a>
  <div class="miner-container">
    <h1>💻 Web Miner</h1>
    <p style="color: var(--mid); margin-bottom: 20px;">Mine blocks using CPU power. Select a block to start.</p>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-box"><div class="stat-val" id="hashrate">0 H/s</div><small>Speed</small></div>
      <div class="stat-box"><div class="stat-val" id="hashes">0</div><small>Hashes done</small></div>
    </div>

    <!-- Block list -->
    <h3>Available Blocks</h3>
    <div id="block-list">Loading...</div>

    <!-- Controls -->
    <div class="controls">
      <label>CPU Threads: <span id="thread-val">1</span></label>
      <input type="range" id="threads" min="1" max="8" value="1" oninput="updateThreads()" style="width:100%; accent-color: var(--amber);">
      <button id="stop-btn" class="btn-mine" disabled onclick="stopMining()">■ Stop Mining</button>
      <div id="console" class="console"></div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let workers = [];
    let currentBounty = null;
    let totalHashes = 0;
    let startTime = null;
    let polling;

    function log(msg) {
      const c = document.getElementById('console');
      c.innerHTML += `> ${msg}<br>`;
      c.scrollTop = c.scrollHeight;
    }

    async function fetchBlocks() {
      try {
        const res = await fetch(`${API}/active_bounties_list`);
        const data = await res.json();
        renderBlocks(data);
      } catch(e) { log('Error fetching blocks: ' + e.message); }
    }

    function renderBlocks(data) {
      const list = document.getElementById('block-list');
      const ids = Object.keys(data);
      if (ids.length === 0) {
        list.innerHTML = '<p>No blocks available.</p>';
        return;
      }
      list.innerHTML = ids.map(id => {
        const b = data[id];
        return `<div class="block-card">
          <div class="block-info">
            <div class="block-id">#${id.substring(0,8)}</div>
            <span class="badge">${b.difficulty_bits} bits</span>
            <span class="badge">${b.reward} CC</span>
          </div>
          <button class="btn-mine" onclick="startMining('${id}', ${b.difficulty_bits})">Mine</button>
        </div>`;
      }).join('');
    }

    async function startMining(bountyId) {
      stopMining();
      currentBounty = bountyId;
      totalHashes = 0;
      startTime = Date.now();
      document.getElementById('stop-btn').disabled = false;
      log(`Starting mining on block ${bountyId}...`);
      const jobRes = await fetch(`${API}/get_job/${bountyId}`);
      const job = await jobRes.json();
      const threads = parseInt(document.getElementById('threads').value);
      for (let i = 0; i < threads; i++) {
        const worker = new Worker('/static/js/cpu.js');
        worker.postMessage({
          last_hash: job.last_hash,
          username: localStorage.getItem('choco_user') || 'anonymous',
          startNonce: i * 1000000,
          target_bin: job.target_bin,
          bounty_id: bountyId,
          server_url: API,
          use_gpu: false,
          workerId: i
        });
        worker.onmessage = e => {
          if (e.data.status === 'progress') {
            totalHashes += e.data.hashesDone;
            document.getElementById('hashes').textContent = totalHashes;
            const elapsed = (Date.now() - startTime)/1000;
            document.getElementById('hashrate').textContent = (totalHashes/elapsed).toFixed(0) + ' H/s';
          } else if (e.data.status === 'found') {
            log(`🎉 Nonce found: ${e.data.nonce}`);
            submitSolution(bountyId, e.data.nonce);
            stopMining();
          }
        };
        workers.push(worker);
      }
    }

    function stopMining() {
      workers.forEach(w => w.terminate());
      workers = [];
      document.getElementById('stop-btn').disabled = true;
      currentBounty = null;
    }

    async function submitSolution(id, nonce) {
      try {
        const res = await fetch(`${API}/submit_solution?bounty_id=${id}&nonce=${nonce}&worker_name=${localStorage.getItem('choco_user')}&device_type=web`);
        const data = await res.json();
        if (data.status === 'success') {
          log('✅ Block solved! Earned 1 CC');
        } else {
          log('❌ ' + (data.reason || 'Rejected'));
        }
      } catch(e) { log('Error: ' + e.message); }
      fetchBlocks();
    }

    function updateThreads() {
      document.getElementById('thread-val').textContent = document.getElementById('threads').value;
    }

    // Poll blocks every 30s
    fetchBlocks();
    polling = setInterval(fetchBlocks, 30000);
  </script>
</body>
</html>
