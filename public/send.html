<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CHOCO HUB · Send CC</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════
           CHOCO HUB · GLOBAL DESIGN SYSTEM
           ═══════════════════════════════════════════ */
        :root {
            --void:        #0a0a12;
            --deep:        #0d0b0a;
            --surface:     rgba(20, 20, 35, 0.7);
            --raised:      #1d1d2e;
            --overlay:     rgba(8, 8, 16, 0.94);
            --border:      rgba(255, 149, 0, 0.08);
            --border-mid:  rgba(255, 149, 0, 0.18);
            --border-hi:   rgba(255, 149, 0, 0.35);
            --text:        #eee4d8;
            --mid:         #8b8296;
            --dim:         #4a4458;
            --amber:       #f58a00;
            --amber-soft:  #ffb347;
            --amber-glow:  rgba(245, 138, 0, 0.25);
            --amber-faint: rgba(245, 138, 0, 0.04);
            --gold:        #f2c94c;
            --green:       #40c057;
            --red:         #fa5252;
            --pink:        #f06292;
            --pending:     #f5a623;

            --bg: var(--void);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-full: 99px;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-card-hover: 0 20px 48px rgba(0, 0, 0, 0.55);
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 14px; }

        body {
            margin: 0; padding: 0; background-color: #0a0807;
            background-image:
                radial-gradient(circle at 50% 40%, rgba(255, 120, 0, 0.08) 0%, transparent 70%),
                radial-gradient(circle at 50% 50%, #140d0a 0%, #0a0807 100%);
            background-attachment: fixed; color: var(--text); font-family: 'Outfit', sans-serif;
            overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        button { font-family: inherit; cursor: pointer; border: none; outline: none; }
        a { color: var(--amber); text-decoration: none; }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(255, 149, 0, 0.05); }
            50% { box-shadow: 0 0 15px rgba(255, 149, 0, 0.2); }
            100% { box-shadow: 0 0 5px rgba(255, 149, 0, 0.05); }
        }
        @keyframes liquidMove {
            0% { transform: translate(0, 0) scale(1) rotate(30deg); }
            50% { transform: translate(-5%, 5%) scale(1.3) rotate(100deg); }
            100% { transform: translate(5%, -5%) scale(1) rotate(-2deg); }
        }
        @keyframes logoBounce {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
            50% { transform: translateY(0); }
            70% { transform: translateY(-3px); }
        }
        @keyframes shimmerRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulsePending {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .liquid-bg {
            position: fixed; top: -25%; left: -25%; width: 150%; height: 150%;
            background: radial-gradient(circle at center, rgba(255, 149, 0, 0.04) 0%, rgba(30, 20, 10, 0.2) 30%, transparent 60%);
            z-index: -1; pointer-events: none; filter: blur(60px);
            animation: liquidMove 20s ease-in-out infinite alternate;
        }

        /* Send Container */
        .send-container {
            width: min(560px, 94vw);
            margin: 40px auto 60px;
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .send-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--amber);
            text-shadow: 0 0 16px var(--amber-glow);
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }
        .logo .logo-icon {
            display: inline-block;
            font-size: 1.6rem;
            animation: logoBounce 3s ease-in-out infinite;
        }

        .btn-back {
            background: rgba(255,255,255,0.06);
            color: var(--mid);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s var(--ease-smooth);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back:hover {
            color: var(--amber);
            border-color: var(--border-hi);
            background: rgba(255,149,0,0.08);
        }

        /* Send Card */
        .send-card {
            background: var(--surface);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s var(--ease-smooth), box-shadow 0.4s var(--ease-smooth);
            margin-bottom: 28px;
        }
        .send-card:hover {
            border-color: var(--border-hi);
            box-shadow: var(--shadow-card-hover), 0 0 20px rgba(245,166,35,0.08);
        }
        .send-card::after {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.03) 0%, transparent 50%);
            pointer-events: none;
            animation: shimmerRotate 20s linear infinite;
        }

        .send-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }
        .send-subtitle {
            color: var(--mid);
            font-size: 0.85rem;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        /* Balance row */
        .balance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255,149,0,0.06);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }
        .balance-label {
            color: var(--mid);
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .balance-value {
            font-family: 'Space Mono', monospace;
            color: var(--amber);
            font-weight: 700;
            font-size: 1rem;
        }

        /* Fee info */
        .fee-info {
            display: flex;
            justify-content: space-between;
            padding: 6px 0 16px 0;
            font-size: 0.75rem;
            color: var(--dim);
            position: relative;
            z-index: 1;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .fee-info .fee-value {
            color: var(--mid);
            font-family: 'Space Mono', monospace;
        }

        /* Field */
        .field-lbl {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 7px;
            display: block;
            position: relative;
            z-index: 1;
        }
        .field-inp {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 10, 20, 0.5);
            border: 1px solid var(--border-mid);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            position: relative;
            z-index: 1;
            margin-bottom: 18px;
        }
        .field-inp:focus {
            border-color: var(--border-hi);
        }

        /* Send button */
        .btn-send {
            width: 100%;
            background: linear-gradient(135deg, var(--amber) 0%, #ff6d00 100%);
            color: #000;
            border-radius: var(--radius-md);
            padding: 16px;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 22px rgba(255,149,0,.3);
            transition: all 0.25s var(--ease-out-expo);
            position: relative;
            z-index: 1;
            margin-top: 8px;
        }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255,149,0,.45);
        }
        .btn-send:active {
            transform: scale(0.96);
        }
        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* History Card */
        .history-card {
            background: var(--surface);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .history-card h3 {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 18px;
            color: var(--amber);
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
        }
        .history-card h3 .pending-badge {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--pending);
            background: rgba(245, 166, 35, 0.15);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-card h3 .pending-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--pending);
            animation: pulsePending 1.5s ease-in-out infinite;
            display: inline-block;
        }

        .history-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            color: var(--mid);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            flex-wrap: wrap;
            gap: 4px;
        }
        .history-item.pending-item {
            border-color: rgba(245, 166, 35, 0.3);
            background: rgba(245, 166, 35, 0.05);
        }
        .history-item .tx-type {
            font-weight: 700;
            color: var(--amber);
            min-width: 45px;
            font-size: 0.7rem;
        }
        .history-item .tx-type.receive {
            color: var(--green);
        }
        .history-item .tx-type.pending-type {
            color: var(--pending);
        }
        .history-item .tx-details {
            flex: 1;
            text-align: left;
            color: var(--text);
            font-size: 0.75rem;
            padding: 0 6px;
        }
        .history-item .tx-amount {
            font-weight: 700;
            font-size: 0.8rem;
        }
        .history-item .tx-amount.negative {
            color: var(--red);
        }
        .history-item .tx-amount.positive {
            color: var(--green);
        }
        .history-item .tx-amount.pending-amount {
            color: var(--pending);
        }
        .history-item .tx-time {
            font-size: 0.6rem;
            color: var(--dim);
            min-width: 60px;
            text-align: right;
        }
        .history-item .tx-status {
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }
        .history-item .tx-status.pending-status {
            color: var(--pending);
            background: rgba(245, 166, 35, 0.15);
        }
        .history-item .tx-status.confirmed-status {
            color: var(--green);
            background: rgba(64, 192, 87, 0.15);
        }
        .empty-history {
            color: var(--dim);
            text-align: center;
            padding: 20px 0;
            font-style: italic;
        }

        /* Toast */
        #toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #111; padding: 14px 28px; border-radius: 50px;
            border: 1px solid var(--amber); color: #fff; font-weight: 600;
            font-size: 0.85rem; opacity: 0; transition: 0.3s; z-index: 10005;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: var(--green); color: var(--green); }
        #toast.error { border-color: var(--red); color: var(--red); }
        #toast.pending { border-color: var(--pending); color: var(--pending); }

        @media (max-width: 400px) {
            .send-card { padding: 22px 16px; }
            .history-card { padding: 20px 16px; }
            .history-item { flex-wrap: wrap; gap: 4px; }
            .history-item .tx-details { width: 100%; text-align: left; }
        }
    </style>
</head>
<body>

    <div class="liquid-bg" aria-hidden="true"></div>

    <div class="send-container">
        <!-- Header -->
        <div class="send-header">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">💸</span> SEND CC
            </div>
            <a href="index.html" class="btn-back">← Dashboard</a>
        </div>

        <!-- Send Card -->
        <div class="send-card">
            <h1 class="send-title">Transfer Choco Coins</h1>
            <p class="send-subtitle">Send CC to any ChocoHub user. <span style="color:var(--dim);font-size:0.7rem;">Fee: 1%</span></p>

            <!-- Current Balance -->
            <div class="balance-row">
                <span class="balance-label">Your Balance</span>
                <span class="balance-value" id="current-balance">— CC</span>
            </div>

            <!-- Fee Info -->
            <div class="fee-info">
                <span>Transaction Fee (1%)</span>
                <span class="fee-value" id="fee-display">0.0000 CC</span>
            </div>

            <!-- Recipient -->
            <label class="field-lbl">Recipient Username</label>
            <input type="text" id="recipient" class="field-inp" placeholder="e.g. ChocoKing" spellcheck="false">

            <!-- Amount -->
            <label class="field-lbl">Amount (CC)</label>
            <input type="number" id="amount" class="field-inp" placeholder="0.0" min="0.001" step="any">

            <!-- Send Button -->
            <button class="btn-send" id="send-btn">SEND CC</button>
        </div>

        <!-- Transaction History -->
        <div class="history-card">
            <h3>
                📋 Transaction History
                <span class="pending-badge" id="pending-badge" style="display:none;">
                    <span class="dot"></span> <span id="pending-count">0</span> pending
                </span>
            </h3>
            <div id="history-container">
                <p class="empty-history">Loading history...</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" role="status" aria-live="polite"></div>

    <script>
        // ─── Configuration ──────────────────────────────────────────────
        const PENDING_CHECK_INTERVAL = 10000; // 10 giây

        // ─── DOM Elements ──────────────────────────────────────────────
        const sendBtn = document.getElementById('send-btn');
        const recipientEl = document.getElementById('recipient');
        const amountEl = document.getElementById('amount');
        const balanceEl = document.getElementById('current-balance');
        const feeDisplay = document.getElementById('fee-display');
        const historyContainer = document.getElementById('history-container');
        const pendingBadge = document.getElementById('pending-badge');
        const pendingCountEl = document.getElementById('pending-count');

        let currentBalance = 0;
        let pendingTxIds = new Set();
        let pendingCheckInterval = null;

        // ─── Toast Helper ──────────────────────────────────────────────
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            if (!t) return;
            t.textContent = msg;
            t.className = 'show ' + (type || '');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => { t.className = ''; }, 4000);
        }

        // ─── Date Formatting ──────────────────────────────────────────
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return '—';
                return date.toLocaleString('en-US', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            } catch {
                return '—';
            }
        }

        function formatTimeAgo(dateStr) {
            if (!dateStr) return '—';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return '—';
                const diff = Math.floor((Date.now() - date.getTime()) / 1000);
                if (diff < 60) return diff + 's ago';
                if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
                if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
                return Math.floor(diff / 86400) + 'd ago';
            } catch {
                return '—';
            }
        }

        // ─── Fee Calculator ───────────────────────────────────────────
        function calculateFee(amount) {
            if (!amount || isNaN(amount) || amount <= 0) return 0;
            return parseFloat((amount * 0.01).toFixed(8));
        }

        // ─── Update Fee Display ──────────────────────────────────────
        amountEl.addEventListener('input', function() {
            const amount = parseFloat(this.value);
            const fee = calculateFee(amount);
            feeDisplay.textContent = fee > 0 ? fee.toFixed(4) + ' CC' : '0.0000 CC';
        });

        // ─── Load Balance ─────────────────────────────────────────────
        async function loadBalance() {
            const user = localStorage.getItem('choco_user');
            const token = localStorage.getItem('choco_token');
            if (!user || !token) {
                balanceEl.textContent = '— CC';
                sendBtn.disabled = true;
                sendBtn.textContent = 'LOGIN REQUIRED';
                sendBtn.onclick = () => { window.location.href = 'index.html'; };
                return;
            }
            try {
                const res = await fetch('/get_user/' + encodeURIComponent(user), {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.status !== 'error' && typeof data.balance === 'number') {
                        currentBalance = data.balance;
                        balanceEl.textContent = currentBalance.toFixed(4) + ' CC';
                        sendBtn.disabled = false;
                        sendBtn.textContent = 'SEND CC';
                        sendBtn.onclick = handleSend;
                    }
                } else {
                    balanceEl.textContent = '— CC';
                }
            } catch (e) {
                console.warn('Balance load failed:', e.message);
                balanceEl.textContent = '— CC';
            }
        }

        // ─── Load Pending Transactions ────────────────────────────────
        async function loadPendingTransactions() {
            try {
                const res = await fetch('/node_fees/mempool/status');
                if (!res.ok) throw new Error('Failed to fetch mempool');
                const data = await res.json();
                const pending = data.transactions || [];

                // Update badge
                if (pending.length > 0) {
                    pendingBadge.style.display = 'flex';
                    pendingCountEl.textContent = pending.length;
                } else {
                    pendingBadge.style.display = 'none';
                }

                // Store pending tx ids for display
                pendingTxIds = new Set(pending.map(tx => tx.id));
                return pending;
            } catch (e) {
                console.warn('Failed to load pending:', e.message);
                return [];
            }
        }

        // ─── Load Transaction History ─────────────────────────────────
        async function loadHistory() {
            const user = localStorage.getItem('choco_user');
            if (!user) {
                historyContainer.innerHTML = '<p class="empty-history">Login to see history.</p>';
                return;
            }

            try {
                // Load confirmed transactions
                const res = await fetch('/get_transactions?username=' + encodeURIComponent(user));
                if (!res.ok) throw new Error('Failed to fetch history');
                const data = await res.json();
                const transactions = data.transactions || [];

                // Load pending transactions
                const pending = await loadPendingTransactions();

                // Combine: pending first (with status), then confirmed
                const allItems = [];

                // Add pending transactions (only those involving the user)
                const userPending = pending.filter(tx =>
                    tx.from === user || tx.to === user
                );
                for (const tx of userPending) {
                    const isSender = tx.from === user;
                    allItems.push({
                        id: tx.id,
                        from: tx.from,
                        to: tx.to,
                        amount: parseFloat(tx.amount),
                        fee: parseFloat(tx.fee),
                        total: parseFloat(tx.total),
                        created_at: tx.created_at,
                        status: 'pending',
                        isSender: isSender,
                        counterpart: isSender ? tx.to : tx.from,
                        type: isSender ? 'Sent' : 'Received'
                    });
                }

                // Add confirmed transactions
                for (const tx of transactions) {
                    const isSender = tx.from_username === user;
                    allItems.push({
                        id: tx.id || 'tx_' + Date.now(),
                        from: tx.from_username,
                        to: tx.to_username,
                        amount: parseFloat(tx.amount),
                        created_at: tx.created_at,
                        status: 'confirmed',
                        isSender: isSender,
                        counterpart: isSender ? tx.to_username : tx.from_username,
                        type: isSender ? 'Sent' : 'Received'
                    });
                }

                // Sort: pending first (newest first), then confirmed (newest first)
                allItems.sort((a, b) => {
                    if (a.status === 'pending' && b.status !== 'pending') return -1;
                    if (a.status !== 'pending' && b.status === 'pending') return 1;
                    return new Date(b.created_at) - new Date(a.created_at);
                });

                if (allItems.length === 0) {
                    historyContainer.innerHTML = '<p class="empty-history">No transactions yet.</p>';
                    return;
                }

                const list = document.createElement('div');
                list.className = 'history-list';

                for (const tx of allItems) {
                    const isPending = tx.status === 'pending';
                    const isSender = tx.isSender;
                    const amount = tx.amount.toFixed(4);
                    const time = formatTimeAgo(tx.created_at);

                    const item = document.createElement('div');
                    item.className = 'history-item' + (isPending ? ' pending-item' : '');

                    const typeClass = isPending ? 'pending-type' : (isSender ? '' : 'receive');
                    const amountClass = isPending ? 'pending-amount' : (isSender ? 'negative' : 'positive');
                    const amountPrefix = isSender ? '-' : '+';

                    let statusHtml = '';
                    if (isPending) {
                        statusHtml = `<span class="tx-status pending-status">⏳ Pending</span>`;
                    } else {
                        statusHtml = `<span class="tx-status confirmed-status">✅ Done</span>`;
                    }

                    let feeHtml = '';
                    if (isPending && tx.fee) {
                        feeHtml = ` (fee: ${tx.fee.toFixed(4)} CC)`;
                    }

                    item.innerHTML = `
                        <span class="tx-type ${typeClass}">${tx.type}</span>
                        <span class="tx-details">
                            ${isSender ? '→' : '←'} <strong>${tx.counterpart}</strong>
                            ${feeHtml}
                        </span>
                        <span class="tx-amount ${amountClass}">${amountPrefix}${amount} CC</span>
                        <span class="tx-time">${time}</span>
                        ${statusHtml}
                    `;
                    list.appendChild(item);
                }

                historyContainer.textContent = '';
                historyContainer.appendChild(list);
            } catch (e) {
                console.error('History load failed:', e.message);
                historyContainer.innerHTML = '<p class="empty-history">Could not load history.</p>';
            }
        }

        // ─── Handle Send ──────────────────────────────────────────────
        async function handleSend() {
            const user = localStorage.getItem('choco_user');
            const token = localStorage.getItem('choco_token');
            if (!user || !token) {
                showToast('Please login first', 'error');
                window.location.href = 'index.html';
                return;
            }

            const recipient = recipientEl.value.trim();
            const amount = parseFloat(amountEl.value);
            const fee = calculateFee(amount);

            if (!recipient) return showToast('Enter recipient username', 'error');
            if (recipient === user) return showToast('Cannot send to yourself', 'error');
            if (isNaN(amount) || amount <= 0) return showToast('Enter a valid amount', 'error');
            if (amount + fee > currentBalance) return showToast(`Insufficient balance. Need ${(amount + fee).toFixed(4)} CC (incl. ${fee.toFixed(4)} CC fee)`, 'error');

            sendBtn.disabled = true;
            sendBtn.textContent = 'SENDING...';

            try {
                const res = await fetch('/send_cc', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        to_username: recipient,
                        amount: amount
                    })
                });

                const data = await res.json();

                // 🆕 Xử lý response mới với status: 'pending'
                if (data.status === 'pending' || data.status === 'success') {
                    const txId = data.tx_id || 'pending';
                    const totalDeducted = data.total_deducted || (amount + fee);
                    const newBalance = data.new_balance || (currentBalance - totalDeducted);

                    // Cập nhật số dư
                    currentBalance = newBalance;
                    balanceEl.textContent = currentBalance.toFixed(4) + ' CC';

                    // Hiển thị thông báo
                    const msg = `✅ ${amount.toFixed(4)} CC sent to ${recipient} (fee: ${fee.toFixed(4)} CC). Pending confirmation.`;
                    showToast(msg, 'pending');

                    // Reset form
                    recipientEl.value = '';
                    amountEl.value = '';
                    feeDisplay.textContent = '0.0000 CC';

                    // Reload history để hiển thị pending
                    await loadHistory();

                    // Tự động kiểm tra sau 2 giây
                    setTimeout(() => { loadHistory(); }, 2000);
                } else {
                    let errMsg = data.message || 'Transfer failed';
                    if (res.status === 429) errMsg = 'Too many requests. Please wait.';
                    showToast(errMsg, 'error');
                }
            } catch (e) {
                showToast('Network error: ' + e.message, 'error');
                console.error(e);
            }

            sendBtn.disabled = false;
            sendBtn.textContent = 'SEND CC';
        }

        // ─── Auto check pending periodically ─────────────────────────
        function startPendingCheck() {
            if (pendingCheckInterval) clearInterval(pendingCheckInterval);
            pendingCheckInterval = setInterval(() => {
                // Only reload if page is visible
                if (!document.hidden) {
                    loadPendingTransactions();
                    loadHistory();
                }
            }, PENDING_CHECK_INTERVAL);
        }

        // ─── Auth Check ──────────────────────────────────────────────
        (function checkAuth() {
            const token = localStorage.getItem('choco_token');
            if (!token) {
                showToast('Please login first', 'error');
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            }
        })();

        // ─── Init ──────────────────────────────────────────────────────
        async function init() {
            await loadBalance();
            await loadHistory();
            startPendingCheck();

            // Reload on visibility change (user comes back to tab)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    loadBalance();
                    loadHistory();
                }
            });
        }

        init();

        // ─── Cleanup interval on page unload ─────────────────────────
        window.addEventListener('beforeunload', () => {
            if (pendingCheckInterval) clearInterval(pendingCheckInterval);
        });
    </script>
</body>
</html>
