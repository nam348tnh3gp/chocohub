<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choco Hub | Block Hunt · SHA-256</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c; --card: #14151a; --border: rgba(255,184,108,0.15);
            --gold: #ffb86c; --text: #e0e0e0; --mid: #8b949e; --dim: #484f58;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px 16px;
        }
        .btn-back {
            position: fixed; top: 20px; left: 20px;
            font-family: 'Space Mono', monospace; font-size: 0.7rem;
            padding: 8px 12px; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); border-radius: 8px;
            text-decoration: none; color: var(--mid); transition: .3s;
        }
        .btn-back:hover { color: var(--gold); border-color: var(--gold); background: rgba(255,184,108,0.05); }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 1.8rem; color: var(--gold); }
        .header p  { color: var(--mid); font-size: 0.85rem; margin-top: 4px; }
        .container { width: 100%; max-width: 480px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-val  { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--gold); }
        .stat-lbl  { font-size: 0.55rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .section-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
            color: var(--dim); margin-bottom: 10px;
        }
        .block-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .block-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
            display: flex; align-items: center; justify-content: space-between;
            transition: .3s;
        }
        .block-card.mining { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,184,108,0.1); }
        .block-info { flex: 1; }
        .block-id   { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--gold); margin-bottom: 6px; }
        .block-meta { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge        { font-size: 0.65rem; font-weight: 600; padding: 3px 8px; border-radius: 6px; font-family: 'Space Mono', monospace; }
        .badge-diff   { background: rgba(255,184,108,0.1); color: var(--gold); }
        .badge-reward { background: rgba(255,184,108,0.1); color: var(--gold); }
        .badge-mining { background: rgba(255,184,108,0.25); color: #fff; }
        .badge-device { background: rgba(100,200,255,0.1); color: #6be5ff; }
        .btn-hunt { background: var(--gold); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.7rem; white-space: nowrap; }
        .btn-hunt:disabled { opacity: 0.3; cursor: not-allowed; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 0.9rem; }
        .empty-state .icon { font-size: 2rem; margin-bottom: 12px; }
        .control-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
        .control-row   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .control-label { font-size: 0.7rem; color: var(--mid); text-transform: uppercase; letter-spacing: 1px; }
        .control-val   { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--gold); }
        input[type=range] { width: 100%; accent-color: var(--gold); margin-top: 10px; margin-bottom: 14px; }
        .toggle-info { margin-bottom: 14px; font-size: 0.75rem; color: var(--mid); }
        .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dim); border-radius: 20px; transition: .3s; cursor: pointer;
        }
        .toggle-track::before {
            content: ''; position: absolute; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s;
        }
        .toggle-switch input:checked + .toggle-track { background: var(--gold); }
        .toggle-switch input:checked + .toggle-track::before { transform: translateX(16px); }
        .toggle-desc { font-size: 0.7rem; color: var(--dim); margin-top: 4px; }
        .btn-stop, .btn-auto {
            width: 100%; padding: 12px; border-radius: 8px;
            font-weight: 600; font-size: 0.8rem; cursor: pointer;
            transition: .3s; border: 1px solid var(--gold);
        }
        .btn-stop { background: rgba(255,85,85,0.1); color: #ff5555; border-color: #ff5555; margin-bottom: 10px; }
        .btn-auto { background: transparent; color: var(--gold); }
        .btn-auto.active { background: var(--gold); color: #000; }
        .progress-bar-bg { height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
        .progress-bar    { height: 100%; background: var(--gold); width: 0%; transition: width .5s; }
        .console {
            margin-top: 16px; background: #050505; border-radius: 8px;
            padding: 12px; height: 120px; overflow-y: auto;
            font-family: 'Space Mono', monospace; font-size: 0.7rem;
            color: #50fa7b; border: 1px solid rgba(80,250,123,0.1);
        }
        .log-win  { color: #50fa7b; }
        .log-err  { color: #ff5555; }
        .log-warn { color: #f1fa8c; }
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 10px 20px; border-radius: 10px;
            font-size: 0.85rem; opacity: 0; transition: .4s; pointer-events: none; z-index: 999;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.win  { border-color: #50fa7b; color: #50fa7b; }
        #toast.err  { border-color: #ff5555; color: #ff5555; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .btn-create {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #f58a00 0%, #ffae42 100%);
            color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(245, 138, 0, 0.3);
        }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 138, 0, 0.4); }
        .btn-create:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<a href="/" class="btn-back">← BACK</a>

<div class="container">
    <div class="header">
        <h1>⛏️ Block Hunt</h1>
        <p>SHA-256 Miner · Direct CPU</p>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="stat-hashrate">0 H/s</div><div class="stat-lbl">Speed</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-hashes">0</div><div class="stat-lbl">Total Hashes</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-blocks">0</div><div class="stat-lbl">Active Blocks</div></div>
    </div>

    <div class="section-title">Available Blocks</div>
    <div id="block-list" class="block-list"><div class="empty-state"><div class="icon">🔍</div>Searching for blocks…</div></div>

    <div class="section-title" style="margin-top: 25px;">Create New Block</div>
    <div class="control-panel" style="margin-top: 10px;">
        <div class="control-row" style="margin-bottom: 15px;">
            <span class="control-label">DEVICE TARGET</span>
            <select id="device-select" style="background: var(--card); color: var(--gold); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-family: 'Space Mono', monospace; font-size: 0.8rem; width: 100%; margin-top: 5px;">
                <option value="arduino">🖥️ Low Power (Arduino/ESP)</option>
                <option value="web">🚀 Mid-High (Web/Browser)</option>
            </select>
        </div>
        <div class="control-row"><span class="control-label">DIFFICULTY</span><span class="control-val" id="diff-val">8 bits</span></div>
        <input type="range" id="diff-slider" min="8" max="32" value="8" step="1">
        <div style="display: flex; justify-content: space-between;"><span id="min-diff" style="font-size:0.65rem;">8</span><span id="max-diff" style="font-size:0.65rem;">32</span></div>
        <div id="difficulty-desc" style="font-size:0.7rem; text-align:center; margin:8px 0;">🖥️ Easy Arduino Block</div>
        <div style="height:4px; background:var(--border); border-radius:2px;"><div id="difficulty-bar" style="height:100%; width:0%; background:#ffb86c;"></div></div>
        <div class="control-row" style="margin-top:15px;"><span class="control-label">BLOCK REWARD</span>
            <div><input type="number" id="reward-input" min="0.1" max="1000" step="0.1" value="1.0" style="background:var(--card);color:var(--gold);border:1px solid var(--border);border-radius:8px;padding:8px;width:90px;text-align:center;"> <span style="color:var(--gold);">CC</span></div>
        </div>
        <div id="cost-display" style="margin:15px 0; padding:12px; background:rgba(245,138,0,0.05); border-radius:10px; text-align:center;">
            <div style="font-size:0.8rem;">💰 Total Cost</div>
            <div style="font-size:1.2rem; font-weight:bold; color:var(--gold);"><span id="cost-amount">8.0</span> CC</div>
            <div style="font-size:0.65rem;"><span id="fee-breakdown">8 CC paid (reward + burned)</span></div>
        </div>
        <button id="create-btn" class="btn-create" onclick="createBlock()">🚀 CREATE BLOCK</button>
    </div>

    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="control-panel">
        <div class="control-row"><span class="control-label">CPU THREADS</span><span class="control-val" id="thread-val">—</span></div>
        <input type="range" id="thread-slider" min="1" max="16" value="1">
        <button id="stop-btn" class="btn-stop" disabled onclick="stopMining(true)">■ TERMINATE MINER</button>
        <button id="auto-btn" class="btn-auto" onclick="toggleAutoMine()">🤖 AUTO HUNT: OFF</button>
        <div id="console" class="console"></div>
    </div>
</div>
<div id="toast"></div>

<script>
    const API_URL = window.location.origin;
    const POLL_MS = 30000;

    let miningActive = false;
    let miningIntervals = [];
    let currentBountyId = null;
    let currentJob = null;
    let totalHashesAcc = 0;
    let miningStartTime = null;
    let hashrateInterval = null;
    let lastKnownBounties = {};
    let autoMine = false;

    // ── SHA-256 ──────────────────────────────────────
    async function sha256(str) {
        const encoder = new TextEncoder();
        const data = encoder.encode(str);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function meetsTarget(hashHex, targetBinStr) {
        const bitsRequired = targetBinStr.length;
        const hexLen = Math.ceil(bitsRequired / 4);
        const prefixHex = hashHex.substring(0, hexLen);
        let binFull = '';
        for (const ch of prefixHex) {
            binFull += parseInt(ch, 16).toString(2).padStart(4, '0');
        }
        return binFull.startsWith(targetBinStr);
    }

    // ── Helpers ──────────────────────────────────────
    function getWorkerName() { return (localStorage.getItem('choco_user') || 'anonymous').toLowerCase(); }
    function fmtHashrate(hps) { if (hps >= 1e6) return (hps/1e6).toFixed(2)+' MH/s'; if (hps>=1e3) return (hps/1e3).toFixed(2)+' kH/s'; return hps.toFixed(1)+' H/s'; }
    function fmtNum(n) { if (n>=1e9) return (n/1e9).toFixed(1)+'B'; if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'k'; return n.toString(); }
    function log(msg, cls='') {
        const con = document.getElementById('console');
        const line = document.createElement('div'); line.className = 'log-line '+cls; line.textContent = '> '+msg;
        con.appendChild(line); con.scrollTop = con.scrollHeight;
        while(con.children.length>80) con.removeChild(con.firstChild);
    }
    function toast(msg, type='') { const t = document.getElementById('toast'); t.textContent=msg; t.className='show '+type; setTimeout(()=> t.className='', 3500); }

    // ── Mining thread ────────────────────────────────
    function mineRange(threadId, startNonce, endNonce, bountyId, targetBin, lastHash, username, onProgress, onFound) {
        let localNonce = startNonce;
        let localHashes = 0;

        async function step() {
            if (!miningActive || currentBountyId !== bountyId) return;
            const batch = 300;
            for (let i = 0; i < batch && localNonce < endNonce; i++) {
                // ⚠️ QUAN TRỌNG: Server verify = last_hash + nonce + workerName
                const candidate = lastHash + localNonce + username;
                const hashed = await sha256(candidate);
                if (meetsTarget(hashed, targetBin)) {
                    onFound(localNonce);
                    return;
                }
                localNonce++;
                localHashes++;
            }
            onProgress(localHashes);
            if (localNonce >= endNonce) return;
            if (miningActive && currentBountyId === bountyId) setTimeout(step, 0);
        }
        step();
    }

    // ── Stop ─────────────────────────────────────────
    function stopMining(resetAutoFlag = false) {
        if (!miningActive) return;
        miningActive = false;
        for (const tid of miningIntervals) { if (tid) clearInterval(tid); }
        miningIntervals = [];
        if (hashrateInterval) { clearInterval(hashrateInterval); hashrateInterval = null; }
        document.getElementById('stop-btn').disabled = true;
        document.getElementById('progress-bar').style.width = '0%';
        if (resetAutoFlag && autoMine) {
            autoMine = false;
            document.getElementById('auto-btn').textContent = '🤖 AUTO HUNT: OFF';
            document.getElementById('auto-btn').classList.remove('active');
            log('🤖 Auto Hunt disabled.');
        }
        if (currentBountyId) {
            log(`⏹️ Stopped mining block #${currentBountyId}`);
            currentBountyId = null;
            currentJob = null;
            renderBountyList(lastKnownBounties);
        }
        totalHashesAcc = 0;
        document.getElementById('stat-hashrate').textContent = '0 H/s';
    }

    // ── Start ────────────────────────────────────────
    async function startMining(bountyId, cachedData) {
        if (miningActive) stopMining(false);
        let job = cachedData;
        if (!job || !job.target_bin) {
            try {
                const res = await fetch(`${API_URL}/get_job/${bountyId}`);
                if (!res.ok) { log(`Block #${bountyId} not found.`, 'log-err'); return; }
                job = await res.json();
            } catch (e) { log('Error fetching job: ' + e.message, 'log-err'); return; }
        }
        if (!lastKnownBounties[bountyId]) { log(`Block #${bountyId} no longer available.`, 'log-warn'); return; }

        miningActive = true;
        currentBountyId = bountyId;
        currentJob = job;
        totalHashesAcc = 0;
        miningStartTime = Date.now();
        document.getElementById('stop-btn').disabled = false;

        const numThreads = parseInt(document.getElementById('thread-slider').value);
        const workerName = getWorkerName();
        const targetBin = job.target_bin;
        const lastHash = job.last_hash || job.block_hash;
        const diffBits = job.difficulty_bits ?? targetBin.length;

        log(`🚀 Mining: ${numThreads} thread(s) on #${bountyId} (${diffBits} bits)`);
        renderBountyList(lastKnownBounties);

        const maxNonce = 0xffffffff;
        const rangeStep = Math.floor(maxNonce / numThreads);
        const threadRanges = [];
        for (let i = 0; i < numThreads; i++) {
            threadRanges.push({
                start: i * rangeStep,
                end: (i === numThreads - 1) ? maxNonce : (i + 1) * rangeStep
            });
        }

        let hashesThisSecond = 0;
        let lastSecondStamp = Date.now();

        const progressCallback = (threadId, hashesDone) => {
            totalHashesAcc += hashesDone;
            document.getElementById('stat-hashes').textContent = fmtNum(totalHashesAcc);
            hashesThisSecond += hashesDone;
            const now = Date.now();
            if (now - lastSecondStamp >= 1000) {
                document.getElementById('stat-hashrate').textContent = fmtHashrate(hashesThisSecond);
                hashesThisSecond = 0;
                lastSecondStamp = now;
                document.getElementById('progress-bar').style.width = Math.min(90, 20 + (totalHashesAcc / 500000) * 60) + '%';
            }
        };

        const foundCallback = (nonce) => {
            if (!miningActive) return;
            log(`🎯 Nonce found: ${nonce}`, 'log-win');
            const solvedId = currentBountyId;
            stopMining(false);
            submitSolution(solvedId, nonce, workerName);
        };

        // Launch threads
        for (let t = 0; t < numThreads; t++) {
            const range = threadRanges[t];
            let currentNonce = range.start;
            const intervalId = setInterval(async () => {
                if (!miningActive || currentBountyId !== bountyId) { clearInterval(intervalId); return; }
                const BATCH = 500;
                let batchHashes = 0;
                for (let i = 0; i < BATCH && currentNonce < range.end; i++) {
                    // ⚠️ QUAN TRỌNG: Server verify = last_hash + nonce + workerName
                    const candidate = lastHash + currentNonce + workerName;
                    const hashed = await sha256(candidate);
                    if (meetsTarget(hashed, targetBin)) {
                        foundCallback(currentNonce);
                        clearInterval(intervalId);
                        return;
                    }
                    currentNonce++;
                    batchHashes++;
                }
                if (batchHashes > 0) progressCallback(t, batchHashes);
                if (currentNonce >= range.end) clearInterval(intervalId);
            }, 0);
            miningIntervals.push(intervalId);
        }

        hashrateInterval = setInterval(() => {
            if (!miningActive) return;
            const elapsed = (Date.now() - miningStartTime) / 1000;
            if (elapsed > 0) document.getElementById('stat-hashrate').textContent = fmtHashrate(totalHashesAcc / elapsed);
        }, 1000);
    }

    // ── Submit ───────────────────────────────────────
    async function submitSolution(id, nonce, workerName) {
        log(`📡 Submitting nonce ${nonce} for #${id}...`);
        try {
            const res = await fetch(`${API_URL}/submit_solution`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bounty_id: id, nonce: nonce, worker_name: workerName, device_type: 'web_cpu' })
            });
            const result = await res.json();
            if (res.ok && result.status === 'success') {
                log('🏆 BLOCK SOLVED! +' + (result.reward || '?') + ' CC', 'log-win');
                toast('🏆 +' + (result.reward || '?') + ' CC!', 'win');
            } else {
                log('❌ ' + (result.reason || 'Rejected'), 'log-err');
                toast('❌ ' + result.reason, 'err');
            }
            await refreshBounties();
            if (autoMine) {
                const ids = Object.keys(lastKnownBounties);
                if (ids.length > 0 && !miningActive) startMining(ids[0], lastKnownBounties[ids[0]]);
            }
        } catch (e) { log('Connection error: ' + e.message, 'log-err'); }
    }

    // ── Refresh ──────────────────────────────────────
    async function refreshBounties() {
        try {
            const res = await fetch(`${API_URL}/active_bounties_list`);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            lastKnownBounties = data;
            document.getElementById('stat-blocks').textContent = Object.keys(data).length;
            if (currentBountyId && !data[currentBountyId]) {
                log('⚠️ Block solved by another miner.', 'log-warn');
                stopMining(false);
                if (autoMine) {
                    const ids = Object.keys(lastKnownBounties);
                    if (ids.length) startMining(ids[0], lastKnownBounties[ids[0]]);
                }
            }
            if (autoMine && !miningActive && Object.keys(data).length > 0) {
                startMining(Object.keys(data)[0], data[Object.keys(data)[0]]);
            }
            renderBountyList(data);
        } catch (e) { log('⚠️ Server error: ' + e.message, 'log-warn'); }
    }

    function renderBountyList(data) {
        const container = document.getElementById('block-list');
        const bounties = Object.values(data);
        if (bounties.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No blocks</div>';
            return;
        }
        container.innerHTML = '';
        bounties.forEach(b => {
            const isMining = (b.id === currentBountyId);
            const div = document.createElement('div');
            div.className = 'block-card' + (isMining ? ' mining' : '');
            div.innerHTML = `
                <div class="block-info">
                    <div class="block-id">#${b.id}</div>
                    <div class="block-meta">
                        <span class="badge badge-diff">${b.difficulty_bits || '?'} bits</span>
                        <span class="badge badge-reward">${(b.reward || 0).toFixed(4)} CC</span>
                        <span class="badge badge-device">${b.target_device || 'any'}</span>
                        ${isMining ? '<span class="badge badge-mining">⚡ MINING</span>' : ''}
                    </div>
                </div>
                <button class="btn-hunt" onclick="startMiningFromList('${b.id}')" ${isMining ? 'disabled' : ''}>${isMining ? 'MINING' : 'HUNT'}</button>
            `;
            container.appendChild(div);
        });
    }
    window.startMiningFromList = (id) => { startMining(id, lastKnownBounties[id]); };

    function toggleAutoMine() {
        autoMine = !autoMine;
        const btn = document.getElementById('auto-btn');
        btn.textContent = '🤖 AUTO HUNT: ' + (autoMine ? 'ON' : 'OFF');
        btn.classList.toggle('active', autoMine);
        if (autoMine && !miningActive) {
            const ids = Object.keys(lastKnownBounties);
            if (ids.length > 0) startMining(ids[0], lastKnownBounties[ids[0]]);
        }
    }

    // ── Create block ─────────────────────────────────
    function updateDeviceType() {
        const device = document.getElementById('device-select').value;
        const slider = document.getElementById('diff-slider');
        if (device === 'arduino') { slider.min = 8; slider.max = 16; slider.value = 8; }
        else { slider.min = 17; slider.max = 32; slider.value = 17; }
        updateDifficulty(); updateCost();
    }
    function updateDifficulty() {
        const diff = parseInt(document.getElementById('diff-slider').value);
        document.getElementById('diff-val').innerText = diff + ' bits';
        document.getElementById('difficulty-bar').style.width = ((diff - 8) / 24) * 100 + '%';
        updateCost();
    }
    function updateCost() {
        const reward = parseFloat(document.getElementById('reward-input').value) || 1.0;
        document.getElementById('cost-amount').innerText = '8.0';
        document.getElementById('fee-breakdown').innerHTML = `8 CC → ${reward.toFixed(1)} CC reward + ${(8 - reward).toFixed(1)} CC burned`;
    }
    async function createBlock() {
        const diff = parseInt(document.getElementById('diff-slider').value);
        const device = document.getElementById('device-select').value;
        const reward = parseFloat(document.getElementById('reward-input').value);
        const pin = localStorage.getItem('choco_pin');
        const username = localStorage.getItem('choco_user');
        if (!username || !pin) { toast('Login required', 'err'); return; }
        const btn = document.getElementById('create-btn');
        btn.innerText = '⏳ CREATING...'; btn.disabled = true;
        try {
            const res = await fetch(`${API_URL}/create_bounty`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, pin, difficulty: diff, reward, target_device: device })
            });
            const data = await res.json();
            if (res.ok && data.status === 'success') {
                log('💰 Block created! Balance: ' + (data.new_balance?.toFixed(4) || '?') + ' CC', 'log-win');
                toast('Block created!', 'win');
                refreshBounties();
            } else { toast(data.detail || 'Failed', 'err'); }
        } catch (e) { toast('Connection error', 'err'); } finally { btn.innerText = '🚀 CREATE BLOCK'; btn.disabled = false; }
    }

    // ── Init ─────────────────────────────────────────
    window.onload = () => {
        const slider = document.getElementById('thread-slider');
        slider.max = navigator.hardwareConcurrency || 4;
        slider.value = Math.min(4, slider.max);
        document.getElementById('thread-val').innerText = slider.value + ' thread(s)';
        slider.oninput = () => document.getElementById('thread-val').innerText = slider.value + ' thread(s)';
        refreshBounties();
        setInterval(refreshBounties, POLL_MS);
        document.getElementById('device-select').addEventListener('change', updateDeviceType);
        document.getElementById('diff-slider').addEventListener('input', updateDifficulty);
        document.getElementById('reward-input').addEventListener('input', updateCost);
        updateDeviceType();
    };
</script>
</body>
</html>
