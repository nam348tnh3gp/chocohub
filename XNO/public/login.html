<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Dashboard - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a12 0%, #1a1a2a 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(30,30,42,0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 24px;
            width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,149,0,0.2);
        }
        h1 {
            color: #f58a00;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            color: #8b8296;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a36;
            border: 1px solid #3a3a46;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus {
            border-color: #f58a00;
        }
        button {
            width: 100%;
            background: #f58a00;
            color: #0a0a12;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #ff9e20;
        }
        .error {
            color: #ff6b6b;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
        }
        .footer {
            margin-top: 1.5rem;
            text-align: center;
            color: #6a6280;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Nano Dashboard</h1>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="admin" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        <button onclick="login()">Login</button>
        <div id="errorMsg" class="error"></div>
        <div class="footer">Default: admin / admin</div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    if (data.firstLogin) {
                        window.location.href = '/setup.html';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    document.getElementById('errorMsg').innerText = data.error;
                }
            } catch(err) {
                document.getElementById('errorMsg').innerText = 'Network error';
            }
        }
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
