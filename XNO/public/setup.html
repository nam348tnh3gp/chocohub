<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Nano Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a12 0%, #1a1a2a 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .setup-container {
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: rgba(30,30,42,0.95);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,149,0,0.2);
        }
        h1 {
            color: #f58a00;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .sub {
            color: #8b8296;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            color: #8b8296;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a36;
            border: 1px solid #3a3a46;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #f58a00;
            box-shadow: 0 0 0 2px rgba(245,138,0,0.2);
        }
        button {
            background: #f58a00;
            color: #0a0a12;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }
        button:hover {
            background: #ff9e20;
            transform: translateY(-1px);
        }
        .error {
            color: #ff6b6b;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
        }
        .success {
            color: #44ff44;
        }
        hr {
            border-color: rgba(255,149,0,0.2);
            margin: 1.5rem 0;
        }
        .info-text {
            font-size: 0.75rem;
            color: #6a6280;
            text-align: center;
            margin-top: 1rem;
        }
        .skip-link {
            text-align: center;
            margin-top: 1rem;
        }
        .skip-link a {
            color: #6a6280;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .skip-link a:hover {
            color: #f58a00;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="card">
            <h1>⚙️ First Time Setup</h1>
            <div class="sub">Please change your password and connect to ChocoHub</div>
            
            <div class="input-group">
                <label>New Password (min 4 characters)</label>
                <input type="password" id="newPassword" placeholder="Enter new password">
            </div>
            
            <hr>
            
            <div class="input-group">
                <label>ChocoHub Username</label>
                <input type="text" id="chocoUser" placeholder="Your ChocoHub username (e.g., chocoetom)">
            </div>
            <div class="input-group">
                <label>ChocoHub PIN</label>
                <input type="password" id="chocoPin" placeholder="Your ChocoHub PIN">
            </div>
            
            <button onclick="saveSetup()">💾 Save & Continue</button>
            <div id="errorMsg" class="error"></div>
            <div class="info-text">
                🔗 This connects your dashboard to ChocoHub to view and fulfill swaps.
            </div>
        </div>
        
        <div class="skip-link">
            <a href="#" onclick="skipSetup()">Skip for now (I'll set up later)</a>
        </div>
    </div>

    <script>
        async function saveSetup() {
            const newPassword = document.getElementById('newPassword').value;
            const chocoUser = document.getElementById('chocoUser').value;
            const chocoPin = document.getElementById('chocoPin').value;
            
            if (!chocoUser || !chocoPin) {
                document.getElementById('errorMsg').innerText = '❌ Please enter ChocoHub credentials';
                return;
            }
            
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Connecting...';
            
            try {
                const res = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        new_password: newPassword || undefined,
                        chocohub_username: chocoUser,
                        chocohub_pin: chocoPin
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('errorMsg').style.color = '#44ff44';
                    document.getElementById('errorMsg').innerText = '✅ Setup successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    document.getElementById('errorMsg').innerText = '❌ ' + data.error;
                    btn.disabled = false;
                    btn.textContent = '💾 Save & Continue';
                }
            } catch(err) {
                document.getElementById('errorMsg').innerText = '❌ Network error: ' + err.message;
                btn.disabled = false;
                btn.textContent = '💾 Save & Continue';
            }
        }
        
        async function skipSetup() {
            // Skip setup for now, just mark first_login as false
            try {
                const res = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    window.location.href = '/';
                }
            } catch(err) {
                window.location.href = '/';
            }
        }
        
        // Enter key support
        document.getElementById('chocoPin').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveSetup();
        });
    </script>
</body>
</html>
